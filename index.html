<div class="container">

    <div class="row text-center" style="margin-top:30px;margin-bottom:20px;">
      <div class="col-md-12">
        <h3>HTML/JS 格式化</h3>
      </div>
    </div>

    <div class="row">
      <div class="col-md-12">
          <textarea class="form-control" rows="10" id="content" placeholder="请在这里输入您需要格式化的HTML或者JS代码"></textarea>
      </div>
    </div>

    <div class="row" style="margin-top:20px">
      <div class="col-md-12 text-center">
        <label class="form-inline" style="margin:5px;">
            模式：
            <select style="width:140px;" class="form-control" id="tabsize">
              <option value="1">制表符缩进</option>
              <option value="2">2个空格缩进</option>
              <option value="4" selected="selected">4个空格缩进</option>
              <option value="8">8个空格缩进</option>
            </select>
        </label>
        <button type="submit" class="btn btn-danger" id="beautify" style="margin:5px;">格式化</button>
        <button type="submit" class="btn btn-primary" id="btn2" style="margin:5px;">代码压缩</button>
        <button type="submit" class="btn btn-primary" id="btn3" style="margin:5px;">加密压缩</button>
        <button type="submit" class="btn btn-primary" id="copy" data-clipboard-target="#shuchu" style="margin:5px;">复制结果</button>
        <button type="submit" class="btn btn-primary" id="btn5" style="margin:5px;">清空结果</button>
      </div>
    </div>
    
    <div class="row" style="margin-top:20px">
      <div class="col-xs-12">
        <textarea class="form-control" rows="10" id="shuchu" placeholder="成功格式化代码区域"></textarea>
      </div>
    </div>
        
    <div>
      <h3>工具介绍</h3>
      输入HTML代码，可以进行代码自动格式化，自动缩进换行，修正无效HTML代码，它可以美化杂乱的HTML代码,同时纠正HTML代码错误，也可以进行HTML压缩！ ！
    </div>

</div>
			
<!-- 代码压缩 -->

  $(function() {
      $("[data-toggle='tooltip']").tooltip();
  });
  toastr.options.positionClass = 'toast-center-center';
</script>

<!-- 这里是新增的js内容 -->
<script type="text/javascript" src="./JS_HTML格式化_加密压缩工具_files/base.js"></script>
<script type="text/javascript" src="./JS_HTML格式化_加密压缩工具_files/jsformat.js"></script>
<script type="text/javascript" src="./JS_HTML格式化_加密压缩工具_files/htmlformat.js"></script>
<script src="./JS_HTML格式化_加密压缩工具_files/clipboard.min.js"></script>


<script type="text/javascript">

    $("#beautify").bind("click",
    function() {
      js_source = document.getElementById('content').value.replace(/^\s+/, '');
      tabsize = document.getElementById('tabsize').value;
      tabchar = ' ';
      if (tabsize == 1) {
        tabchar = '\t'
      }
      if (js_source && js_source.charAt(0) === '<') {
        document.getElementById('shuchu').value = style_html(js_source, tabsize, tabchar, 80)
      } else {
        document.getElementById('shuchu').value = js_beautify(js_source, tabsize, tabchar)
      }
      return false
    });
    $("#btn2").bind("click",
    function() {
      var input = document.getElementById('content').value;
      var packer = new Packer;
      var output = packer.pack(input, 0, 0);
      document.getElementById('shuchu').value = output;
      return false
    });
    $("#btn3").bind("click",
    function() {
      var input = document.getElementById('content').value;
      var packer = new Packer;
      var output = packer.pack(input, 1, 0);
      document.getElementById('shuchu').value = output;
      return false
    });
    $("#btn5").bind("click",
    function() {
      document.getElementById('content').value = '';
      document.getElementById('shuchu').value = '';
      document.getElementById('content').select();
      return false
    });

    var clipboard = new ClipboardJS('#copy');
    clipboard.on('success', function (e) {
      if (e.text != "") {
        toastr.success("复制成功");
      }
      else {
        toastr.success("还未去除");
      }
    });

    clipboard.on('error', function (e) {
      toastr.success("复制失败");
    });

</script>
